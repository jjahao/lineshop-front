<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>жҸҖиІЁе–®</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC',sans-serif;background:#f5f5f7;color:#0F1111}
.bar{position:sticky;top:0;z-index:10;padding:10px 14px;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center}
.bar.g{background:#2e7d32;color:#fff}.bar.y{background:#f9a825;color:#111}.bar.r{background:#c62828;color:#fff}
.actions{display:flex;gap:8px;padding:8px 10px;background:#fff;border-bottom:1px solid #eee}
.actions button{flex:1;padding:10px;border:0;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}
.scan-btn{background:#1976d2;color:#fff}.scan-btn:disabled{background:#aaa}
.upload-btn{background:#FF9900;color:#fff}
.settings-bar{background:#fff;padding:10px 12px;border-bottom:1px solid #eee}
.settings-bar summary{font-size:13px;font-weight:700;color:#1976d2;cursor:pointer}
.sf{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.sf label{font-size:12px;color:#555}
.sf input,.sf select{padding:6px 8px;border:1px solid #D5D9D9;border-radius:6px;font-size:13px;width:80px}
.sf select{width:auto}
.tab{display:flex;background:#fff;border-bottom:1px solid #ddd;position:sticky;top:40px;z-index:9}
.tab button{flex:1;padding:11px;border:0;background:transparent;font-size:13px;font-weight:600;color:#666;cursor:pointer}
.tab button.on{color:#1976d2;border-bottom:2px solid #1976d2}
.list{padding:10px}
.card{background:#fff;border-radius:10px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.card img{width:100%;border-radius:8px;background:#f3f3f3;max-height:400px;object-fit:contain;margin-bottom:10px}
.row{display:flex;gap:8px;align-items:center;margin:6px 0}
.row label{flex:0 0 54px;font-size:12px;color:#666}
.row input,.row .val{flex:1;padding:8px;border:1px solid #D5D9D9;border-radius:6px;font-size:14px}
.row .val{border:0;color:#555;background:transparent}
.save{background:#1976d2;color:#fff;border:0;border-radius:8px;padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer}
.recalc{background:#f9a825;color:#111;border:0;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer}
.pid{font-size:11px;color:#999;margin-top:4px}
.empty{padding:40px;text-align:center;color:#888}
.order-card{background:#fff;border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.order-email{font-weight:700;font-size:14px;margin-bottom:4px}
.order-meta{font-size:11px;color:#888;margin-bottom:8px}
.item{display:flex;flex-direction:column;gap:6px;padding:10px 0;border-top:1px solid #f0f0f0}
.item-top{display:flex;flex-direction:column;gap:2px}
.item-name{font-size:14px;font-weight:700;color:#111;line-height:1.3}
.item-name-zh{font-size:12px;color:#888;line-height:1.3}
.item-meta{font-size:11px;color:#888;margin-top:2px}
.item-bottom{display:flex;gap:10px;align-items:stretch}
.item-bottom img{width:72px;height:72px;object-fit:contain;border-radius:8px;background:#f3f3f3;flex-shrink:0;align-self:center}
.item-right{display:flex;flex-direction:column;gap:6px;flex:1}
.item-qty{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;text-align:center;font-size:20px;font-weight:700}
.pick-btn{width:100%;background:#2e7d32;color:#fff;border:0;border-radius:10px;padding:13px;font-size:16px;font-weight:700;cursor:pointer}
.pick-btn:disabled{background:#aaa}
.spin{display:inline-block;width:24px;height:24px;border:2px solid #eee;border-top-color:#1976d2;border-radius:50%;animation:sp .8s linear infinite;margin:30px auto;display:block}
@keyframes sp{to{transform:rotate(360deg)}}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:calc(100% - 40px);max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px}
.stage-box{border:1px solid #e0e0e0;border-radius:10px;padding:14px;margin-bottom:12px}
.stage-box h4{font-size:14px;font-weight:700;margin-bottom:8px}
.stage-info{font-size:13px;color:#555;margin-bottom:10px;line-height:1.5}
.stage-btn{width:100%;padding:11px;border:0;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer}
.stage-btn.go{background:#FF9900;color:#fff}
.stage-btn.done{background:#2e7d32;color:#fff;cursor:default}
.stage-btn.err{background:#c62828;color:#fff;cursor:default}
.stage-btn.wait{background:#999;color:#fff;cursor:not-allowed}
.stage-btn.spin-btn{background:#1976d2;color:#fff;cursor:not-allowed}
.close-btn{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;background:#fff;font-size:14px;cursor:pointer;margin-top:8px}
</style>
</head>
<body>
<div style="background:#232F3E;padding:10px 14px;display:flex;align-items:center;gap:10px">
  <a href="dashboard.html" style="color:#FF9900;text-decoration:none;font-size:20px">вҶҗ</a>
  <span style="color:#fff;font-weight:700;font-size:15px;flex:1" id="batchTitle"></span>
  <a id="shopperLink" href="#" target="_blank" style="color:#FF9900;font-size:12px;text-decoration:none">йҒёиіјз«ҷйҖЈзөҗ рҹ“Ӣ</a>
</div>
<div id="bar" class="bar g">иЁҳеёіеҷЁијүе…ҘдёӯвҖҰ</div>
<div id="nextStep" style="background:#FFF8E1;border-left:4px solid #FF9900;padding:10px 14px;font-size:13px;line-height:1.6;display:none"></div>
<div class="actions">
  <button class="scan-btn" id="scanBtn" onclick="scanNow()">рҹ”Қ з«ӢеҚіжҺғжҸҸж–°з…§зүҮ</button>
  <button class="upload-btn" onclick="uploadModal()">рҹҸ  еӣһе®¶пјҡдёҠеӮі Shop2000</button>

<!-- еҢҜзҺҮиҲҮжүӢзәҢиІ»иЁӯе®ҡ -->
<div class="settings-bar">
  <details id="settingsToggle">
    <summary>вҡҷпёҸ еҢҜзҺҮ / жүӢзәҢиІ»иЁӯе®ҡ</summary>
    <div class="sf">
      <div><label>еҢҜзҺҮ ВҘ1 =</label><br><input id="cfgRate" type="number" step="0.001" value="0.23"> TWD</div>
      <div><label>жүӢзәҢиІ»ж–№ејҸ</label><br>
        <select id="cfgFeeType">
          <option value="pct">еҠ  %</option>

      <div style="display:flex;align-items:flex-end"><button class="recalc" onclick="recalcAll()">рҹ”„ йҮҚз®—е…ЁйғЁеҸ°е№Ј</button></div>

<div class="tab">

<div class="overlay" id="uploadOverlay">
  <div class="modal">
    <h3>рҹҸ  еӣһе®¶пјҡдёҠеӮі Shop2000</h3>
    <div class="stage-box" id="s1box">
      <h4>з¬¬ 1 ж®өпјҡдёҠжһ¶е•Ҷе“Ғ</h4>
      <div class="stage-info" id="s1info">ијүе…Ҙе•Ҷе“Ғж•ё...</div>
      <button class="stage-btn wait" id="s1btn" disabled>дёҠжһ¶е•Ҷе“ҒеҲ° Shop2000</button>
    </div>
    <div class="stage-box" id="s2box">
      <h4>з¬¬ 2 ж®өпјҡеҢҜе…ҘиЁӮе–®</h4>
      <div class="stage-info" id="s2info">е®ҢжҲҗз¬¬ 1 ж®өеҫҢй–Ӣж”ҫ</div>
      <button class="stage-btn wait" id="s2btn" disabled>еҢҜе…Ҙе®ўжҲ¶иЁӮе–®</button>
    </div>
    <div id="uploadNote" style="font-size:12px;color:#888;margin-top:10px;text-align:center">
      жң¬ж©ҹ daemon ж”¶еҲ°еҫҢиҮӘеӢ•еҹ·иЎҢпјҢзҙ„йңҖ 1-3 еҲҶйҗҳ
    </div>
    <button class="close-btn" onclick="closeUploadModal()">й—ңй–ү</button>
  </div>
</div>

<script>
const GAS = 'https://silent-unit-718clineshop-proxy.jjahao.workers.dev';
const params = new URLSearchParams(location.search);
const BATCH = params.get('batch') || '';
const TOKEN = params.get('token') || 'lineshop2026';
const TAB   = params.get('tab') || 'p';
if (!BATCH) { location.href = 'dashboard.html?token=' + encodeURIComponent(TOKEN); }

function api(view, extra) {
  return GAS + '?view=' + view + '&batch=' + encodeURIComponent(BATCH) + '&token=' + encodeURIComponent(TOKEN) + (extra||'');
}
function fmt(n){return 'NT$'+Number(n).toLocaleString('zh-Hant')}
function fmtJpy(n){return 'ВҘ'+Number(n).toLocaleString('ja-JP')}
function fmtTs(ts){try{const d=new Date(ts);return (d.getMonth()+1)+'/'+(d.getDate())+' '+(d.getHours()).toString().padStart(2,'0')+':'+(d.getMinutes()).toString().padStart(2,'0');}catch(_){return String(ts||'')}}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

// в”Җв”Җ еҢҜзҺҮ/жүӢзәҢиІ»иЁӯе®ҡпјҲlocalStorage дҝқеӯҳпјү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const LS_KEY = 'lineshop_picker_cfg';
function loadCfg() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if (s) {
      if (s.rate) document.getElementById('cfgRate').value = s.rate;
      if (s.feeType) document.getElementById('cfgFeeType').value = s.feeType;
      if (s.feeVal !== undefined) document.getElementById('cfgFeeVal').value = s.feeVal;
    }
  } catch(_) {}
}
function saveCfg() {
  const cfg = { rate: getRate(), feeType: getFeeType(), feeVal: getFeeVal() };
  localStorage.setItem(LS_KEY, JSON.stringify(cfg));
}
function getRate() { return Number(document.getElementById('cfgRate').value) || 0.23; }
function getFeeType() { return document.getElementById('cfgFeeType').value; }
function getFeeVal() { return Number(document.getElementById('cfgFeeVal').value) || 0; }

function calcTwd(jpy) {
  jpy = Number(jpy) || 0;
  const rate = getRate();
  const ft = getFeeType();
  const fv = getFeeVal();
  let base = jpy;
  if (ft === 'pct') base = jpy * (1 + fv / 100);
  else if (ft === 'jpy') base = jpy + fv;
  const twd = base * rate;
  if (ft === 'twd') return Math.ceil(twd + fv);
  return Math.ceil(twd);
}

['cfgRate','cfgFeeType','cfgFeeVal'].forEach(id => {
  document.getElementById(id).addEventListener('change', saveCfg);
});

function show(t) {
  document.getElementById('tabP').className = t==='p'?'on':'';
  document.getElementById('tabO').className = t==='o'?'on':'';
  document.getElementById('panP').style.display = t==='p'?'':'none';
  document.getElementById('panO').style.display = t==='o'?'':'none';
}

let _products = [];
const CACHE_KEY = 'picker_cache_' + BATCH;

function applyData(d, fromCache) {
  renderBudget(d.budget);
  _products = d.products.rows || [];
  renderProducts(d.products);
  renderOrders(d.orders);
  updateNextStep(d);
  if (!fromCache) {
    if (TAB === 'o') show('o');
    else if (TAB === 'upload') { show('p'); uploadModal(); }
  }
}

async function load() {
  loadCfg();
  document.getElementById('batchTitle').textContent = BATCH;
  const base = location.origin + location.pathname.replace(/\/[^/]*$/, '/');
  const shopUrl = base + 'index.html?batch=' + encodeURIComponent(BATCH);
  const shopLink = document.getElementById('shopperLink');
  shopLink.href = shopUrl;
  shopLink.onclick = function(e) { e.preventDefault(); navigator.clipboard.writeText(shopUrl).then(()=>alert('е·ІиӨҮиЈҪйҒёиіјз«ҷйҖЈзөҗпјҒ\n' + shopUrl)).catch(()=>window.open(shopUrl)); };

  // еҝ«еҸ–е…ҲжёІжҹ“пјҲж„ҹиҰәз§’й–Ӣпјү
  let hadCache = false;
  try {
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
    if (cached) { applyData(cached, true); hadCache = true; }
  } catch(_) {}

  // иғҢжҷҜжӢүж–°иіҮж–ҷ
  try {
    const d = await fetch(api('picker_data')).then(x=>x.json());
    if (d.ok===false) { document.getElementById('bar').textContent = 'Token йҢҜиӘӨ: '+d.error; return; }
    localStorage.setItem(CACHE_KEY, JSON.stringify(d));
    applyData(d, false);
  } catch(e) {
    if (!hadCache) document.getElementById('bar').textContent = 'ијүе…ҘеӨұж•—: '+e;
  }
}

function updateNextStep(d) {
  const el = document.getElementById('nextStep');
  const prods = (d.products.rows || []).length;
  const orders = (d.orders.orders || []).length;
  const picked = (d.orders.orders || []).filter(o => o.picked > 0).length;

  let bg, stepNum, title, desc, btnHtml;

  if (prods === 0) {
    bg='#E3F2FD'; stepNum='жӯҘй©ҹ 1пјҸ4'; title='рҹ“ё жҺғжҸҸз…§зүҮ';
    desc='жӢҚе®Ңз…§е·ІдёҹйҖІ Drive иіҮж–ҷеӨҫпјҹжҢүдёӢж–№и—ҚиүІгҖҢрҹ”Қ з«ӢеҚіжҺғжҸҸж–°з…§зүҮгҖҚпјҢAI иҮӘеӢ•иҫЁиӯҳе•Ҷе“ҒеҗҚзЁұе’Ңеғ№ж јгҖӮ';
    btnHtml='';
  } else if (orders === 0) {
    bg='#FFF8E1'; stepNum='жӯҘй©ҹ 2пјҸ4'; title='рҹ“Ӣ еӮійҒёиіјз«ҷйҖЈзөҗзөҰе®ўжҲ¶';
    desc=`е·ІиҫЁиӯҳ ${prods} д»¶е•Ҷе“ҒпјҢзӣҙжҺҘеӮійҖЈзөҗзөҰе®ўжҲ¶дёӢе–®гҖӮеҰӮжңүе•Ҷе“Ғеғ№ж јжңүиӘӨпјҢеңЁдёӢж–№жё…е–®зӣҙжҺҘж”№гҖӮ`;
    btnHtml=`<button onclick="document.getElementById('shopperLink').click()" style="margin-top:10px;width:100%;padding:12px;background:#FF9900;color:#fff;border:0;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer">рҹ“Ӣ иӨҮиЈҪйҒёиіјз«ҷйҖЈзөҗпјҢеӮізөҰе®ўжҲ¶</button>`;
  } else if (picked === 0) {
    bg='#E8F5E9'; stepNum='жӯҘй©ҹ 3пјҸ4'; title='рҹӣ’ еҺ»зҸҫе ҙжҺЎиіјпјҢиІ·еҲ°еҫҢеӢҫйҒё';
    desc=`е·Іж”¶еҲ° ${orders} зӯҶиЁӮе–®пјҒеҺ»еә—иЈЎжҠҠе®ўжҲ¶иҰҒзҡ„е•Ҷе“ҒиІ·иө·дҫҶпјҢиІ·еҲ°еҫҢй»һдёҠж–№гҖҢиЁӮе–®пјҲеӢҫиІ·еҲ°пјүгҖҚеҲҶй ҒпјҢеЎ«ж•ёйҮҸжҢүгҖҢеӢҫгҖҚгҖӮ`;
    btnHtml=`<button onclick="show('o')" style="margin-top:10px;width:100%;padding:12px;background:#2e7d32;color:#fff;border:0;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer">рҹӣ’ еҲҮеҲ°иЁӮе–®еҲҶй ҒпјҢй–Ӣе§ӢеӢҫйҒё</button>`;
  } else {
    bg='#F3E5F5'; stepNum='жӯҘй©ҹ 4пјҸ4'; title='рҹҸ  еӣһе®¶еҫҢдёҠеӮіеҲ° Shop2000';
    desc=`е·ІеӢҫ ${picked} зӯҶпјҢжҺЎиіје®ҢжҲҗпјҒеӣһеҲ°е®¶еҫҢжҢүдёӢж–№ж©ҳиүІгҖҢрҹҸ  еӣһе®¶пјҡдёҠеӮі Shop2000гҖҚпјҢдҫқеәҸе®ҢжҲҗе…©ж®өдёҠеӮіеҚіеҸҜгҖӮ`;
    btnHtml='';
  }

  el.style.display = '';
  el.style.background = bg;
  el.style.borderLeft = '4px solid #FF9900';
  el.style.padding = '12px 14px';
  el.innerHTML = `
    <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${stepNum}</div>
    <div style="font-size:16px;font-weight:800;color:#111;margin-bottom:6px">${title}</div>
    <div style="font-size:13px;color:#444;line-height:1.6">${desc}</div>
    ${btnHtml}`;
}

function renderBudget(r) {
  const b = document.getElementById('bar');
  b.className = 'bar '+(r.status==='red'?'r':r.status==='yellow'?'y':'g');
  b.innerHTML = '<span>рҹ“ё '+r.photos+' ејө В· '+r.calls+' ж¬Ўе‘јеҸ«</span><span>NT$'+r.today_twd+' / '+r.limit_twd+'</span>';
}

function renderProducts(r) {
  const el = document.getElementById('panP');
  const rows = r.rows || [];
  if (!rows.length) { el.innerHTML = '<div class="empty">е°ҡз„Ўе•Ҷе“Ғ<br><small>жӢҚз…§дёҹйҖІ Drive иіҮж–ҷеӨҫеҫҢжҢүжҺғжҸҸ</small></div>'; return; }
  el.innerHTML = rows.map(p => {
    const zh = p.name_zh || '';
    const jp = p.name_final || p.name_jp || '';
    return `
    <div class="card" data-pid="${p.photo_id}">
      <img src="${esc(p.image_url)}" onerror="this.style.background='#eee'">
      <div class="row"><label>ж—Ҙж–Ү</label><input id="n_${p.photo_id}" value="${esc(jp)}"></div>
      <div class="row"><label>дёӯж–Ү</label><input id="zh_${p.photo_id}" value="${esc(zh)}" placeholder="зҝ»иӯҜдёӯвҖҰ"></div>
      <div class="row"><label>ж—Ҙе№Ј</label><input id="j_${p.photo_id}" type="number" value="${p.price_jpy||0}" onchange="onJpyChange('${p.photo_id}')"></div>
      <div class="row"><label>еҸ°е№Ј</label><input id="t_${p.photo_id}" type="number" value="${p.price_twd}"></div>
      <div class="row"><label>жўқзўј</label><input id="b_${p.photo_id}" value="${esc(p.barcode||'')}"><button class="save" onclick="saveP('${p.photo_id}')">еӯҳ</button></div>
      <div class="pid">ID: ${p.photo_id} В· ${p.note||''}</div>
    </div>`;
  }).join('');
}

function onJpyChange(pid) {
  const jpy = Number(document.getElementById('j_'+pid).value) || 0;
  document.getElementById('t_'+pid).value = calcTwd(jpy);
}

function recalcAll() {
  saveCfg();
  document.querySelectorAll('.card[data-pid]').forEach(card => {
    const pid = card.dataset.pid;
    const jpyInput = document.getElementById('j_'+pid);
    if (jpyInput) {
      const twd = calcTwd(Number(jpyInput.value) || 0);
      document.getElementById('t_'+pid).value = twd;
    }
  });
}

function renderOrders(r) {
  const el = document.getElementById('panO');
  const orders = r.orders || [];
  if (!orders.length) { el.innerHTML = '<div class="empty">е°ҡз„ЎиЁӮе–®<br><small>е®ўжҲ¶дёӢе–®еҫҢеҮәзҸҫеңЁйҖҷ</small></div>'; return; }
  const byEmail = {};
  orders.forEach(o => { (byEmail[o.email]=byEmail[o.email]||[]).push(o); });
  let html = '';
  for (const email in byEmail) {
    const lst = byEmail[email];
    let tot = 0; lst.forEach(o => { if(o.picked>0) tot += o.picked*Number(o.product.price_twd); });
    html += `<div class="order-card">
      <div class="order-email">рҹ“§ ${esc(email)}</div>
      <div class="order-meta">${fmtTs(lst[0].ts)} В· е·ІиІ·еҲ°еҗҲиЁҲ ${fmt(tot)}</div>`;
    lst.forEach(o => {
      const pk = o.picked==null ? o.qty : o.picked;
      const stat = o.status||'еҫ…иҷ•зҗҶ';
      const sc = stat==='иІ·еҲ°'?'#2e7d32':stat==='зјәиІЁ'?'#c62828':stat==='йғЁеҲҶ'?'#f9a825':'#666';
      const tsafe = String(o.ts).replace(/[^0-9]/g,'');
      const jpName = esc(o.product.name||'');
      const zhName = esc(o.product.name_zh||'');
      const isDone = stat==='иІ·еҲ°'||stat==='зјәиІЁ';
      html += `<div class="item">
        <div class="item-top">
          <div class="item-name">${jpName||zhName||'(з„Ў)'}</div>
          ${zhName&&jpName?`<div class="item-name-zh">${zhName}</div>`:''}
          <div class="item-meta">иҰҒ ${o.qty} д»¶ В· ${fmtJpy(o.product.price_jpy||0)} вҶ’ ${fmt(o.product.price_twd)} В· <span class="stat-${tsafe}_${o.photo_id}" style="color:${sc};font-weight:700">${stat}</span>${isDone?` <button style="font-size:10px;padding:2px 6px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;color:#666" onclick="unlockItem('${esc(o.ts)}','${esc(o.email)}','${o.photo_id}',this)">и§ЈйҺ–</button>`:''}</div>
        </div>
        <div class="item-bottom">
          <img src="${esc(o.product.image||'')}" onerror="this.style.background='#eee'">
          <div class="item-right">
            <input class="item-qty" type="number" min="0" max="${o.qty}" value="${pk}" ${isDone?'disabled':''} id="pk_${tsafe}_${o.photo_id}">
            <button class="pick-btn" ${isDone?'disabled style="background:#aaa"':''} onclick="pickIt('${esc(o.ts)}','${esc(o.email)}','${o.photo_id}',${o.qty},this.previousElementSibling)">вң“ еӢҫйҒёпјҲе·ІиІ·еҲ°пјү</button>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('panO').innerHTML = html;
}

async function saveP(pid) {
  const name = document.getElementById('n_'+pid).value;
  const zh = document.getElementById('zh_'+pid).value;
  const jpy = document.getElementById('j_'+pid).value;
  const price = document.getElementById('t_'+pid).value;
  const bc = document.getElementById('b_'+pid).value;
  try {
    const r = await fetch(api('save_product',
      '&pid='+encodeURIComponent(pid)+
      '&name='+encodeURIComponent(name)+
      '&zh='+encodeURIComponent(zh)+
      '&jpy='+jpy+
      '&price='+price+
      '&bc='+encodeURIComponent(bc)
    )).then(x=>x.json());
    alert(r.ok ? 'вң… е·Іеӯҳ' : 'еӨұж•—: '+r.error);
  } catch(e) { alert('еӨұж•—: '+e); }
}

async function pickIt(ts, email, pid, wantQty, inpEl) {
  const inp = inpEl || document.getElementById('pk_'+String(ts).replace(/[^0-9]/g,'')+'_'+pid);
  if (!inp) { alert('жүҫдёҚеҲ°ж•ёйҮҸж јпјҢи«ӢйҮҚж–°ж•ҙзҗҶй Ғйқў'); return; }
  const btn = inp.nextElementSibling;
  const pk = Number(inp.value);
  const status = pk===0?'зјәиІЁ':pk>=wantQty?'иІ·еҲ°':'йғЁеҲҶ';
  const sc = status==='иІ·еҲ°'?'#2e7d32':status==='зјәиІЁ'?'#c62828':status==='йғЁеҲҶ'?'#f9a825':'#666';
  // еҚіжҷӮеҸҚжҮү
  btn.disabled = true; btn.textContent = 'вҸі'; inp.disabled = true;
  try {
    const r = await fetch(api('mark_picked','&ts='+encodeURIComponent(ts)+'&email='+encodeURIComponent(email)+'&pid='+encodeURIComponent(pid)+'&qty='+pk+'&status='+encodeURIComponent(status))).then(x=>x.json());
    if (r.ok) {
      // еҺҹең°жӣҙж–°пјҢдёҚйҮҚијүй Ғйқў
      btn.textContent = 'вң“'; btn.style.background = sc;
      const tsafe = String(ts).replace(/[^0-9]/g,'');
      const statEl = document.querySelector('.stat-'+tsafe+'_'+pid);
      if (statEl) { statEl.textContent = status; statEl.style.color = sc; }
    } else {
      btn.disabled = false; btn.textContent = 'еӢҫ'; btn.style.background = '';
      inp.disabled = false;
      alert('еӨұж•—: '+r.error);
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = 'еӢҫ'; btn.style.background = '';
    inp.disabled = false;
    alert('еӨұж•—: '+e);
  }
}

async function scanNow() {
  const btn = document.getElementById('scanBtn');
  btn.disabled = true; btn.textContent = 'е•ҹеӢ•дёӯ...';
  try {
    const r = await fetch(api('scan')).then(x=>x.json());
    if (r.status === 'done') {
      btn.textContent = 'вң… е…ЁйғЁе·ІжҺғ';
      load();
      setTimeout(()=>{ btn.disabled=false; btn.textContent='рҹ”Қ з«ӢеҚіжҺғжҸҸж–°з…§зүҮ'; }, 2000);
      return;
    }
    btn.textContent = 'вҸі жҺғжҸҸ '+r.pending+' ејө...';
    const poll = setInterval(async () => {
      try {
        const s = await fetch(api('scan_status')).then(x=>x.json());
        if (s.status === 'done') {
          clearInterval(poll);
          btn.textContent = 'вң… +'+s.done+' ејөе®ҢжҲҗ';
          load();
          setTimeout(()=>{ btn.disabled=false; btn.textContent='рҹ”Қ з«ӢеҚіжҺғжҸҸж–°з…§зүҮ'; }, 3000);
        } else {
          btn.textContent = 'вҸі е·ІжҺғ '+s.done+'/'+(s.done+s.pending)+'...';
        }
      } catch(_) {}
    }, 5000);
    setTimeout(()=>clearInterval(poll), 600000);
  } catch(e) {
    btn.textContent = 'вқҢ '+e;
    setTimeout(()=>{ btn.disabled=false; btn.textContent='рҹ”Қ з«ӢеҚіжҺғжҸҸж–°з…§зүҮ'; }, 3000);
  }
}

// в”Җв”Җ дёҠеӮі modal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let _prodCount = 0, _orderCount = 0, _uploadPollTimer = null;

async function uploadModal() {
  document.getElementById('uploadOverlay').classList.add('on');
  try {
    const d = await fetch(api('picker_data')).then(x => x.json());
    _prodCount  = (d.products?.rows || []).length;
    _orderCount = (d.orders?.orders || []).filter(o => o.picked > 0).length;
    document.getElementById('s1info').textContent = `е…ұ ${_prodCount} д»¶е•Ҷе“ҒпјҢе»әз«Ӣ Shop2000 е•Ҷе“ҒеҲҶйЎһгҖҢд»ЈиіјйҖЈз·ҡ_${BATCH}гҖҚдёҰдёҠеӮі XLSгҖӮ`;
    document.getElementById('s2info').textContent = `е…ұ ${_orderCount} зӯҶе·ІзўәиӘҚиЁӮе–®пјҢеҢҜе…ҘеҲ° xls_add_order.aspxгҖӮ`;
    const s1btn = document.getElementById('s1btn');
    s1btn.className = 'stage-btn go';
    s1btn.disabled = false;
    s1btn.textContent = `в–¶ дёҠжһ¶ ${_prodCount} д»¶е•Ҷе“Ғ`;
    s1btn.onclick = () => triggerStage('products');
    await checkUploadStatus();
  } catch(e) {
    document.getElementById('s1info').textContent = 'и®ҖеҸ–еӨұж•—: ' + e;
  }
}

function closeUploadModal() {
  document.getElementById('uploadOverlay').classList.remove('on');
  if (_uploadPollTimer) { clearInterval(_uploadPollTimer); _uploadPollTimer = null; }
}

async function triggerStage(stage) {
  const btn = document.getElementById(stage === 'products' ? 's1btn' : 's2btn');
  btn.className = 'stage-btn spin-btn'; btn.disabled = true; btn.textContent = 'жҺ’йҡҠдёӯ...';
  try {
    const r = await fetch(api('queue_upload') + '&stage=' + stage).then(x => x.json());
    if (!r.ok && !r.already) throw new Error(r.error || 'queue failed');
    btn.textContent = 'вҸі зӯүеҫ…жң¬ж©ҹеҹ·иЎҢ...';
    document.getElementById('uploadNote').textContent = 'жң¬ж©ҹ daemon зҙ„ 1 еҲҶйҗҳе…§й–Ӣе§Ӣеҹ·иЎҢ...';
    startPollStatus(stage);
  } catch(e) {
    btn.className = 'stage-btn err'; btn.textContent = 'вқҢ ' + e;
  }
}

function startPollStatus(stage) {
  if (_uploadPollTimer) clearInterval(_uploadPollTimer);
  let count = 0;
  _uploadPollTimer = setInterval(async () => {
    count++;
    if (count > 60) { clearInterval(_uploadPollTimer); return; }
    await checkUploadStatus();
  }, 5000);
}

async function checkUploadStatus() {
  try {
    const r = await fetch(api('upload_status')).then(x => x.json());
    applyStatus(r);
  } catch(_) {}
}

function applyStatus(r) {
  const { stage, status, result } = r;
  if (!stage || status === 'idle') return;
  const isProduct = stage === 'products';
  const btn = document.getElementById(isProduct ? 's1btn' : 's2btn');
  const info = document.getElementById(isProduct ? 's1info' : 's2info');
  if (status === 'pending') {
    btn.className = 'stage-btn spin-btn'; btn.disabled = true; btn.textContent = 'вҸі жң¬ж©ҹеҹ·иЎҢдёӯ...';
  } else if (status === 'done') {
    btn.className = 'stage-btn done'; btn.disabled = true; btn.textContent = 'вң… е®ҢжҲҗ';
    info.textContent = result || 'е·Іе®ҢжҲҗ';
    if (isProduct) {
      const s2btn = document.getElementById('s2btn');
      s2btn.className = 'stage-btn go'; s2btn.disabled = false;
      s2btn.textContent = `в–¶ еҢҜе…Ҙ ${_orderCount} зӯҶиЁӮе–®`;
      s2btn.onclick = () => triggerStage('orders');
      document.getElementById('s2info').textContent = `${_orderCount} зӯҶе·ІзўәиӘҚиЁӮе–® вҶ’ xls_add_order.aspx`;
    }
    if (_uploadPollTimer) { clearInterval(_uploadPollTimer); _uploadPollTimer = null; }
  } else if (status === 'error') {
    btn.className = 'stage-btn err'; btn.disabled = false;
    btn.textContent = 'вқҢ еӨұж•—пјҲй»һйҮҚи©Ұпјү';
    info.textContent = result || 'еӨұж•—пјҢи«ӢжҹҘзңӢ daemon log';
    btn.onclick = () => triggerStage(stage);
    if (_uploadPollTimer) { clearInterval(_uploadPollTimer); _uploadPollTimer = null; }
  }
}

async function unlockItem(ts, email, pid, unlockBtn) {
  unlockBtn.disabled = true; unlockBtn.textContent = 'вҸі';
  try {
    const r = await fetch(api('mark_picked','&ts='+encodeURIComponent(ts)+'&email='+encodeURIComponent(email)+'&pid='+encodeURIComponent(pid)+'&qty=0&status=%E5%BE%85%E8%99%95%E7%90%86')).then(x=>x.json());
    if (r.ok) {
      // еҺҹең°жӣҙж–°пјҡжҒўеҫ©ијёе…ҘжЎҶ + еӢҫжҢүйҲ•пјҢз§»йҷӨи§ЈйҺ–жҢүйҲ•пјҢжӣҙж–°зӢҖж…Ӣж–Үеӯ—
      const tsafe = String(ts).replace(/[^0-9]/g,'');
      const inp = document.getElementById('pk_'+tsafe+'_'+pid);
      if (inp) { inp.disabled = false; inp.value = 0; }
      const pickBtn = inp?.nextElementSibling;
      if (pickBtn) { pickBtn.disabled = false; pickBtn.textContent = 'еӢҫ'; pickBtn.style.background = ''; }
      const statEl = document.querySelector('.stat-'+tsafe+'_'+pid);
      if (statEl) {
        statEl.textContent = 'еҫ…иҷ•зҗҶ';
        statEl.style.color = '#666';
        // з§»йҷӨи§ЈйҺ–жҢүйҲ•
        unlockBtn.remove();
      }
    } else {
      unlockBtn.disabled = false; unlockBtn.textContent = 'и§ЈйҺ–';
      alert('и§ЈйҺ–еӨұж•—: '+r.error);
    }
  } catch(e) {
    unlockBtn.disabled = false; unlockBtn.textContent = 'и§ЈйҺ–';
    alert('и§ЈйҺ–еӨұж•—: '+e);
  }
}
