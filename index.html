<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>代購選購站</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang TC','Hiragino Sans',sans-serif;background:#EAEDED;color:#0F1111;padding-bottom:180px}
/* Header */
.hdr{background:#232F3E;padding:0 12px;display:flex;align-items:center;gap:10px;height:52px;position:sticky;top:0;z-index:100}
.hdr-logo{color:#FF9900;font-weight:800;font-size:18px;letter-spacing:-0.5px;white-space:nowrap;line-height:1.1}
.hdr-logo small{color:#ccc;font-size:11px;font-weight:400;display:block}
.hdr-search{flex:1;display:flex;border-radius:4px;overflow:hidden;height:36px}
.hdr-search input{flex:1;padding:0 10px;font-size:14px;border:0;outline:none}
.hdr-search button{background:#FF9900;border:0;padding:0 12px;cursor:pointer;font-size:16px}
.hdr-cart{color:#fff;background:0;border:0;cursor:pointer;display:flex;flex-direction:column;align-items:center;font-size:11px;gap:1px}
.hdr-cart .ic{font-size:22px;position:relative}
.hdr-cart .ic .n{position:absolute;top:-4px;right:-6px;background:#FF9900;color:#111;border-radius:10px;font-size:11px;font-weight:800;padding:0 4px;min-width:16px;text-align:center}
/* Sub nav */
.subnav{background:#37475A;padding:7px 14px;color:#fff;font-size:12px}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:720px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:960px){.grid{grid-template-columns:repeat(5,1fr)}}
.card{background:#fff;border-radius:4px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.card img{width:100%;aspect-ratio:1/1;object-fit:contain;background:#f3f3f3;padding:8px}
.cbody{padding:8px;flex:1;display:flex;flex-direction:column;gap:3px}
.cname{font-size:13px;line-height:1.35;max-height:36px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.ccat{font-size:11px;color:#565959}
.cprice{font-size:17px;font-weight:700;color:#B12704;margin:2px 0}
.cprice small{font-size:11px;font-weight:400}
.cstock{font-size:11px;color:#007600;font-weight:600}
.qrow{display:flex;align-items:center;justify-content:center;gap:8px;margin:6px 0 4px}
.qrow button{background:#fff;border:1px solid #D5D9D9;border-radius:50%;width:28px;height:28px;font-size:18px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center}
.qrow .qv{font-size:14px;font-weight:700;min-width:22px;text-align:center}
.cadd{background:linear-gradient(to bottom,#FFD814,#F7CA00);border:1px solid #FCD200;border-radius:20px;padding:8px 4px;font-size:13px;font-weight:700;color:#0F1111;cursor:pointer;width:100%;text-align:center;margin-top:auto}
.cadd.in{background:linear-gradient(to bottom,#6bcb6b,#4caf50);border-color:#4caf50;color:#fff}
.empty{padding:60px 20px;text-align:center;color:#565959;grid-column:1/-1}
/* 購物車抽屜 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.overlay.on{display:block}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(92vw,400px);background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.2);z-index:210;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s}
.drawer.open{transform:translateX(0)}
.dhdr{background:#232F3E;color:#fff;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.dhdr h2{font-size:15px;font-weight:700}
.dclose{background:0;border:0;color:#fff;font-size:24px;cursor:pointer;line-height:1}
.dlist{flex:1;overflow-y:auto}
.drow{display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid #f0f0f0;align-items:flex-start}
.drow img{width:56px;height:56px;object-fit:contain;background:#f3f3f3;border-radius:4px;flex-shrink:0;padding:4px}
.dm{flex:1;min-width:0}
.dn{font-size:13px;font-weight:600;line-height:1.3;margin-bottom:3px}
.dp{font-size:12px;color:#B12704;font-weight:700}
.dqrow{display:flex;gap:4px;align-items:center;margin-top:6px}
.dqrow button{border:1px solid #D5D9D9;border-radius:4px;padding:2px 8px;cursor:pointer;background:#fff;font-size:14px}
.dqrow span{font-weight:700;font-size:13px;min-width:20px;text-align:center}
.dx{background:0;border:0;color:#aaa;font-size:20px;cursor:pointer;padding:0 4px;flex-shrink:0;align-self:flex-start}
.dtotal{padding:12px 14px;border-top:2px solid #232F3E;font-size:16px;font-weight:700;display:flex;justify-content:space-between;background:#f7f7f7}
.dform{padding:12px 14px;background:#FFFDE7;overflow-y:auto}
.dform label{display:block;font-size:12px;font-weight:700;margin:8px 0 3px;color:#111}
.dform input,.dform textarea{width:100%;padding:8px;border:1px solid #D5D9D9;border-radius:4px;font-size:13px;font-family:inherit}
.dform .hint{font-size:11px;color:#888;margin-top:2px}
.dsubmit{width:100%;background:linear-gradient(to bottom,#FFD814,#F7CA00);border:1px solid #FCD200;border-radius:20px;padding:11px;font-size:14px;font-weight:800;color:#0F1111;cursor:pointer;margin-top:10px}
.dsubmit:disabled{background:#ccc;border-color:#ccc;color:#666;cursor:default}
/* Toast */
.toast{position:fixed;top:62px;left:50%;transform:translateX(-50%);background:#232F3E;color:#fff;padding:9px 20px;border-radius:4px;z-index:300;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* Done overlay */
.done{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.done .box{background:#fff;border-radius:8px;padding:24px;max-width:380px;width:100%;text-align:center}
.done h3{color:#007600;font-size:18px;margin-bottom:10px}
.done p{font-size:13px;color:#565959;margin:8px 0}
/* Loading spinner */
.spin{display:inline-block;width:32px;height:32px;border:3px solid #eee;border-top-color:#FF9900;border-radius:50%;animation:sp .8s linear infinite;margin:40px auto;display:block}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">代購選購<small id="batchLabel"></small></div>
  <div class="hdr-search">
    <input id="q" placeholder="商品搜尋…" oninput="filt()" autocomplete="off">
    <button onclick="filt()">🔍</button>
  </div>
  <button class="hdr-cart" onclick="openCart()">
    <div class="ic">🛒<span class="n" id="cn">0</span></div>
    <div>購物車</div>
  </button>
</div>
<div class="subnav" id="subnav">📦 海外代購直送 · 商品數量有限，搶先下單</div>
<div class="grid" id="grid"><div class="spin"></div></div>

<div class="overlay" id="ov" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="dhdr"><h2>🛒 購物車</h2><button class="dclose" onclick="closeCart()">✕</button></div>
  <div class="dlist" id="dlist"></div>
  <div class="dtotal"><span>小計</span><span id="dtot">NT$0</span></div>
  <div class="dform">
    <label>Shop2000 會員 Email *</label>
    <input id="email" type="email" placeholder="your@email.com" autocomplete="email">
    <div class="hint">⚠️ 須與 Shop2000 帳號相同，訂單才掛到你帳號</div>
    <label>LINE 暱稱</label>
    <input id="line" placeholder="選填">
    <label>備註</label>
    <textarea id="note" rows="2" placeholder="選填"></textarea>
    <button class="dsubmit" id="sb" onclick="submitOrder()">確認下單</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS = 'https://silent-unit-718clineshop-proxy.jjahao.workers.dev';
const params = new URLSearchParams(location.search);
const BATCH = params.get('batch') || '好市多';
let PRODS = [], CART = new Map();

document.getElementById('batchLabel').textContent = BATCH;

function fmt(n){return 'NT$'+Number(n).toLocaleString('zh-Hant')}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

async function loadProducts() {
  try {
    const r = await fetch(GAS + '?view=products&batch=' + encodeURIComponent(BATCH)).then(x => x.json());
    PRODS = r.products || [];
    render(PRODS);
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty">載入失敗，請重新整理頁面<br><small>'+e+'</small></div>';
  }
}

function render(list) {
  const g = document.getElementById('grid');
  if (!list.length) { g.innerHTML = '<div class="empty">目前尚無商品，敬請期待 🛍️</div>'; return; }
  g.innerHTML = list.map(p => {
    const q = CART.get(p.photo_id) || 0;
    return `<div class="card">
      <img loading="lazy" src="${esc(p.image)}" onerror="this.src='';this.style.background='#eee'">
      <div class="cbody">
        <div class="cname">${esc(p.name)}</div>
        <div class="ccat">${esc(p.category||'')}</div>
        <div class="cprice">${fmt(p.price_twd)}<small>（含稅）</small></div>
        <div class="cstock">✓ 現貨代購</div>
        <div class="qrow">
          <button onclick="ch('${p.photo_id}',-1)">−</button>
          <span class="qv" id="v_${p.photo_id}">${q}</span>
          <button onclick="ch('${p.photo_id}',1)">＋</button>
        </div>
        <button class="cadd${q>0?' in':''}" onclick="ch('${p.photo_id}',1)" id="a_${p.photo_id}">${q>0?'✓ 已加 '+q+' 件':'加入購物車'}</button>
      </div>
    </div>`;
  }).join('');
}

function ch(id, d) {
  const cur = CART.get(id)||0, n = Math.max(0, Math.min(99, cur+d));
  if (n===0) CART.delete(id); else CART.set(id, n);
  const vEl = document.getElementById('v_'+id), aEl = document.getElementById('a_'+id);
  if (vEl) vEl.textContent = n;
  if (aEl) { aEl.textContent = n>0 ? '✓ 已加 '+n+' 件' : '加入購物車'; aEl.className = 'cadd'+(n>0?' in':''); }
  document.getElementById('cn').textContent = [...CART.values()].reduce((a,b)=>a+b,0);
}

function openCart() { rcart(); document.getElementById('drawer').classList.add('open'); document.getElementById('ov').classList.add('on'); }
function closeCart() { document.getElementById('drawer').classList.remove('open'); document.getElementById('ov').classList.remove('on'); }

function rcart() {
  let tot=0, html='';
  CART.forEach((q,id) => {
    const p = PRODS.find(x=>String(x.photo_id)===String(id)); if(!p) return;
    const sub = q*Number(p.price_twd); tot += sub;
    html += `<div class="drow">
      <img src="${esc(p.image)}" onerror="this.style.background='#eee'">
      <div class="dm">
        <div class="dn">${esc(p.name)}</div>
        <div class="dp">${fmt(p.price_twd)} × ${q} = ${fmt(sub)}</div>
        <div class="dqrow">
          <button onclick="ch('${id}',-1);rcart()">−</button>
          <span>${q}</span>
          <button onclick="ch('${id}',1);rcart()">＋</button>
        </div>
      </div>
      <button class="dx" onclick="CART.delete('${id}');rcart();render(PRODS)">✕</button>
    </div>`;
  });
  document.getElementById('dlist').innerHTML = html || '<div style="padding:30px;text-align:center;color:#888">尚未加入商品</div>';
  document.getElementById('dtot').textContent = fmt(tot);
}

function filt() {
  const tokens = document.getElementById('q').value.toLowerCase().trim().split(/\s+/).filter(Boolean);
  render(tokens.length ? PRODS.filter(p => {
    const text = ((p.name||'') + ' ' + (p.category||'')).toLowerCase();
    return tokens.every(t => text.includes(t));
  }) : PRODS);
}

function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

async function submitOrder() {
  const email = document.getElementById('email').value.trim();
  if (!email||!email.includes('@')) { toast('請填正確的 Email'); return; }
  if (CART.size===0) { toast('購物車是空的'); return; }
  const items = [...CART.entries()].map(([id,q])=>({photo_id:id,qty:q}));
  const btn = document.getElementById('sb'); btn.disabled=true; btn.textContent='送出中…';
  try {
    const url = GAS + '?view=order&batch=' + encodeURIComponent(BATCH)
      + '&email=' + encodeURIComponent(email)
      + '&items=' + encodeURIComponent(JSON.stringify(items))
      + '&line=' + encodeURIComponent(document.getElementById('line').value||'')
      + '&note=' + encodeURIComponent(document.getElementById('note').value||'');
    const r = await fetch(url).then(x=>x.json());
    if (!r.ok) throw new Error(r.error||'失敗');
    let s = items.map(it=>{ const p=PRODS.find(x=>String(x.photo_id)===String(it.photo_id)); return p?`<div style="padding:5px 0;border-bottom:1px solid #eee;font-size:13px;text-align:left">${esc(p.name)} × ${it.qty}</div>`:''; }).join('');
    document.body.insertAdjacentHTML('beforeend',`<div class="done"><div class="box"><h3>✅ 訂單送出！</h3>${s}<p style="margin-top:10px">買手會盡力採購，有缺貨即時通知。</p><button class="dsubmit" onclick="location.reload()" style="margin-top:12px">繼續選購</button></div></div>`);
  } catch(e) { btn.disabled=false; btn.textContent='確認下單'; toast('送出失敗: '+e); }
}

loadProducts();
</script>
</body>
</html>
